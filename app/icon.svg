<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="#6366F1"/>
  
  <!-- Cloud shape for "Heaven" -->
  <ellipse cx="100" cy="75" rx="45" ry="25" fill="#A5B4FC" opacity="0.3"/>
  <ellipse cx="80" cy="80" rx="35" ry="20" fill="#A5B4FC" opacity="0.3"/>
  <ellipse cx="120" cy="80" rx="35" ry="20" fill="#A5B4FC" opacity="0.3"/>
  
  <!-- Feather Pen (representing writing) -->
  <path d="M 85 130 Q 90 110 95 90 Q 100 70 105 50 L 110 52 Q 105 72 100 92 Q 95 112 90 132 Z" 
        fill="#FFFFFF" stroke="#E0E7FF" stroke-width="1.5"/>
  
  <!-- Feather details -->
  <path d="M 105 50 Q 115 48 120 55" stroke="#E0E7FF" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 102 65 L 108 63" stroke="#E0E7FF" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 100 75 L 107 73" stroke="#E0E7FF" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 98 85 L 106 83" stroke="#E0E7FF" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 96 95 L 104 93" stroke="#E0E7FF" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 94 105 L 102 103" stroke="#E0E7FF" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Inkwell base -->
  <rect x="70" y="130" width="35" height="40" rx="3" fill="#1E293B"/>
  <ellipse cx="87.5" cy="130" rx="17.5" ry="5" fill="#334155"/>
  
  <!-- Ink surface -->
  <ellipse cx="87.5" cy="145" rx="14" ry="4" fill="#4F46E5"/>
  
  <!-- Paper lines (suggesting writing/blogging) -->
  <line x1="115" y1="125" x2="155" y2="125" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="115" y1="138" x2="165" y2="138" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="115" y1="151" x2="150" y2="151" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Decorative star/sparkle -->
  <path d="M 145 65 L 147 70 L 152 72 L 147 74 L 145 79 L 143 74 L 138 72 L 143 70 Z" 
        fill="#FCD34D" opacity="0.8"/>
  <path d="M 60 95 L 61.5 98 L 64.5 99.5 L 61.5 101 L 60 104 L 58.5 101 L 55.5 99.5 L 58.5 98 Z" 
        fill="#FCD34D" opacity="0.8"/>
</svg>